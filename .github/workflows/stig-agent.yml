name: AI STIG Compliance Agent

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stig-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI STIG Compliance Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python agents/stig_agent.py

      - name: Upload STIG Report
        uses: actions/upload-artifact@v4
        with:
          name: stig-remediation-report
          path: compliance/reports/stig-remediation-report.md
